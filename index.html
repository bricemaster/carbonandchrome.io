<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon & Chrome — Coming Soon</title>
<meta name="description" content="Carbon & Chrome Holdings LLC — Something is being built.">
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='0' fill='%230D0D0F'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='serif' font-size='20' font-weight='600' fill='%23b8965a'%3EC%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--void:#060606;--gold:#b8965a;--gold-hi:#d4aa6a;--border:#1c1c1c;--text:#efefef;--body:#a3a3a3;--dim:#606060;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Montserrat',sans-serif;--mono:'Courier Prime',monospace}
body{background:var(--void);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;overflow:hidden}

/* Grain */
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.032;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-repeat:repeat;background-size:256px}

/* Ambient glow */
.glow{position:fixed;top:35%;left:50%;width:500px;height:350px;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(184,150,90,0.03) 0%,transparent 70%);pointer-events:none}

.content{position:relative;z-index:1;text-align:center;max-width:500px}

/* Wordmark */
.wordmark{font-family:var(--sans);font-weight:600;font-size:10px;letter-spacing:7px;text-transform:uppercase;color:var(--body);margin-bottom:56px;user-select:none}
.wordmark span{color:var(--gold)}

/* Main text */
h1{font-family:var(--serif);font-size:clamp(2.5rem,7vw,4rem);font-weight:400;letter-spacing:-0.5px;line-height:1.15;margin-bottom:12px}
h1 em{font-style:italic;color:var(--gold)}

.sub{font-family:var(--sans);color:var(--body);font-size:0.85rem;font-weight:300;line-height:1.7;margin-bottom:48px;max-width:380px;margin-left:auto;margin-right:auto}

/* Divider */
.divider{width:48px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 48px;opacity:0.4}

/* Email form */
.form-wrap{width:100%;max-width:380px;margin:0 auto 20px}
.form-row{display:flex;gap:0;border:1px solid var(--border);overflow:hidden;transition:border-color 0.3s}
.form-row:focus-within{border-color:rgba(184,150,90,0.3)}
.form-row input{flex:1;background:var(--void);border:none;color:var(--text);font-size:16px;padding:0 16px;height:48px;outline:none;font-family:var(--sans);font-weight:300}
.form-row input::placeholder{color:var(--dim)}
.form-row button{background:var(--gold);color:var(--void);border:none;font-family:var(--mono);font-size:9px;font-weight:400;letter-spacing:2px;text-transform:uppercase;padding:0 24px;cursor:pointer;transition:background 0.2s;white-space:nowrap}
.form-row button:hover{background:var(--gold-hi)}

.form-note{font-family:var(--mono);font-size:0.55rem;color:var(--dim);letter-spacing:1px}

/* Success */
.form-success{display:none;font-family:var(--mono);font-size:0.65rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}

/* Gate */
.gate{margin-top:56px;padding-top:32px;border-top:1px solid var(--border);width:100%;max-width:380px}
.gate-label{font-family:var(--mono);font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px}
.gate-row{display:flex;gap:0;border:1px solid var(--border);overflow:hidden;transition:border-color 0.3s}
.gate-row:focus-within{border-color:rgba(184,150,90,0.2)}
.gate-row input{flex:1;background:var(--void);border:none;color:var(--text);font-size:16px;padding:0 16px;height:44px;outline:none;font-family:var(--sans);font-weight:300}
.gate-row input::placeholder{color:var(--dim)}
.gate-row button{background:transparent;color:var(--body);border:none;border-left:1px solid var(--border);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:0 16px;cursor:pointer;transition:color 0.2s}
.gate-row button:hover{color:var(--gold)}
.gate-error{color:#c0392b;font-family:var(--mono);font-size:0.55rem;margin-top:8px;display:none}

/* Footer */
.footer{position:fixed;bottom:20px;font-family:var(--mono);font-size:0.45rem;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}

@media(max-width:480px){
  .form-row,.gate-row{flex-direction:column;border:none;gap:8px}
  .form-row input,.form-row button,.gate-row input,.gate-row button{border:1px solid var(--border);width:100%;height:48px}
  .gate-row button{border-left:1px solid var(--border)}
}
</style>
</head>
<body>
<div class="glow"></div>

<div class="content">
  <div class="wordmark">CARBON <span>&</span> CHROME</div>

  <h1>Something<br><em>is being built.</em></h1>

  <div class="divider"></div>

  <p class="sub">Tools, technology, and premium products for people who build real things. We're putting the finishing touches on it.</p>

  <div class="form-wrap">
    <div class="form-row" id="email-form">
      <input type="email" id="email-input" placeholder="your@email.com" required>
      <button type="button" id="email-btn">Notify Me</button>
    </div>
    <div class="form-success" id="email-success">You're on the list.</div>
  </div>
  <p class="form-note">First to know. No spam.</p>

  <div class="gate">
    <p class="gate-label">Team access</p>
    <div class="gate-row">
      <input type="password" id="gate-input" placeholder="Access code">
      <button type="button" id="gate-btn">Enter</button>
    </div>
    <p class="gate-error" id="gate-error">Wrong code.</p>
  </div>
</div>

<p class="footer">&copy; 2026 Carbon & Chrome Holdings LLC</p>

<script>
document.getElementById('email-btn').addEventListener('click', function() {
  var input = document.getElementById('email-input');
  var form = document.getElementById('email-form');
  var success = document.getElementById('email-success');
  if (!input.value || !input.validity.valid) {
    input.style.borderColor = '#c0392b';
    setTimeout(function() { input.style.borderColor = ''; }, 2000);
    return;
  }
  form.style.display = 'none';
  success.style.display = 'block';
});

var ACCESS_CODE = 'cc2026build';
document.getElementById('gate-btn').addEventListener('click', function() {
  var input = document.getElementById('gate-input');
  var error = document.getElementById('gate-error');
  if (input.value === ACCESS_CODE) {
    document.cookie = 'cc-access=1;path=/;max-age=' + (30*24*60*60) + ';SameSite=Lax';
    // Show the real site
    window.location.href = '/site.html';
  } else {
    error.style.display = 'block';
    input.value = '';
    setTimeout(function() { error.style.display = 'none'; }, 2500);
  }
});

// Auto-redirect if already authenticated
if (document.cookie.indexOf('cc-access=1') !== -1) {
  window.location.href = '/site.html';
}

document.getElementById('gate-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('gate-btn').click();
});
document.getElementById('email-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('email-btn').click();
});
</script>
</body>
</html>
